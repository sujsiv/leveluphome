<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LevelUp Home">
<meta name="theme-color" content="#0f0f18">
<title>LevelUp Home</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500;1,700&family=Lato:wght@300;400;700;900&family=Bangers&family=Nunito:wght@400;700;800;900&family=Syne:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#0f0f18;color:#fff}
.screen{position:fixed;inset:0;z-index:100;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── HOME ── */
#s-home{background:linear-gradient(160deg,#0f0f18 0%,#1a1a2e 100%);align-items:center;justify-content:center;padding:30px 20px}
.home-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:4px;text-align:center}
.home-logo span{color:#f0c060}
.home-tag{font-size:12px;color:#444;margin-bottom:48px;text-align:center;letter-spacing:2px;text-transform:uppercase}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:360px}
.hcard{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.07);border-radius:22px;padding:24px 16px;text-align:center;cursor:pointer;transition:transform 0.2s;-webkit-tap-highlight-color:transparent}
.hcard:active{transform:scale(0.96)}
.hcard-em{font-size:40px;display:block;margin-bottom:10px}
.hcard-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.hcard-role{font-size:11px;color:#555;margin-top:3px}
.hcard.caditi{border-color:rgba(201,114,138,0.4)}
.hcard.cnarain{border-color:rgba(232,48,48,0.4)}
.hcard.cparent{border-color:rgba(240,192,96,0.3)}

/* ── PIN ── */
#s-pin{background:linear-gradient(160deg,#0f0f18 0%,#1a1a2e 100%);align-items:center;justify-content:center;padding:30px 20px}
.pin-logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#444;margin-bottom:28px;text-align:center}
.pin-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center}
.pin-sub{font-size:13px;color:#555;margin-bottom:34px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:38px;justify-content:center}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #333;transition:all 0.15s}
.pin-dot.filled{background:#f0c060;border-color:#f0c060}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;text-align:center;cursor:pointer;font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff;transition:background 0.15s}
.pin-btn:active{background:rgba(255,255,255,0.15)}
.pin-error{color:#e83030;font-size:13px;margin-top:14px;opacity:0;transition:opacity 0.2s;text-align:center;min-height:20px}
.pin-back{color:#444;font-size:13px;margin-top:22px;cursor:pointer;text-decoration:underline;text-align:center}

/* ── CELEBRATION ── */
#s-cel{background:rgba(0,0,0,0.92);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:30px;text-align:center;z-index:500;position:relative;overflow:hidden}
.cel-em{font-size:88px;animation:cbounce 0.6s ease infinite alternate;display:block;margin-bottom:18px}
@keyframes cbounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-18px) scale(1.06)}}
.cel-title{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:10px}
.cel-sub{font-size:15px;color:#aaa;margin-bottom:30px;line-height:1.6;max-width:280px}
.cel-btn{background:#f0c060;color:#1a1000;border:none;border-radius:50px;padding:14px 44px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;position:relative;z-index:2}
.cp{position:absolute;width:8px;height:8px;border-radius:2px;animation:cfall 3s linear infinite}
@keyframes cfall{0%{transform:translateY(-80px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── APP ── */
#s-app{background:#111;flex-direction:column}
.app-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:76px}
.bnav{position:absolute;bottom:0;left:0;right:0;display:flex;border-top:1px solid rgba(255,255,255,0.07);padding:10px 0 env(safe-area-inset-bottom,16px);z-index:10}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bnav-icon{font-size:19px}
.bnav-lbl{font-size:10px;font-weight:600;letter-spacing:0.3px}

/* TIME BADGE */
.time-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;font-family:'DM Sans',sans-serif;letter-spacing:0.3px}
.time-past{background:rgba(0,0,0,0.12);color:#aaa}
.time-now{background:#f0c060;color:#1a1000;animation:tpulse 1.5s ease-in-out infinite}
@keyframes tpulse{0%,100%{opacity:1}50%{opacity:0.7}}
.time-future{background:rgba(255,255,255,0.08);color:#888}

/* ANYTIME SECTION */
.anytime-badge{background:rgba(255,255,255,0.06);color:#777;font-size:10px;padding:2px 8px;border-radius:10px}

/* ══════════════════════════════
   ADITI
   ══════════════════════════════ */
.abg{background:#fdf5f0;min-height:100%}
.abn{background:rgba(253,245,240,0.97);backdrop-filter:blur(20px);border-top-color:#f0ddd8}
.abn .bnav-lbl{color:#ccc}
.abn .bnav-item.active .bnav-lbl{color:#c9728a}

.a-hero{background:linear-gradient(160deg,#3d1a2e 0%,#6b2d4a 60%,#3d1a2e 100%);padding:26px 20px 20px;text-align:center;position:relative;overflow:hidden}
.a-hero::before{content:'✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦';position:absolute;top:8px;left:0;right:0;font-size:9px;letter-spacing:10px;color:rgba(255,215,180,0.1);white-space:nowrap;overflow:hidden}
.a-av{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,#c9728a,#e8a0b8);font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:3px solid rgba(255,215,180,0.45);box-shadow:0 0 0 6px rgba(201,114,138,0.18),0 8px 24px rgba(0,0,0,0.3);animation:abob 3s ease-in-out infinite}
@keyframes abob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.a-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;font-style:italic;color:#fdf0e8}
.a-era{font-family:'Lato',sans-serif;font-size:11px;font-weight:300;letter-spacing:3px;color:rgba(255,215,180,0.5);margin-top:3px;text-transform:uppercase}
.a-lvl-pill{display:inline-flex;align-items:center;background:rgba(255,215,180,0.1);border:1px solid rgba(255,215,180,0.18);border-radius:30px;padding:4px 16px;margin-top:10px}
.a-lvl-txt{font-family:'Playfair Display',serif;font-size:12px;color:#ffd7b4;font-style:italic}

.a-xp-card{margin:13px 16px 0;background:#fff;border:1px solid #f0ddd8;border-radius:15px;padding:12px 15px;box-shadow:0 1px 7px rgba(180,100,120,0.06)}
.a-xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.a-xp-lbl{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:#8b4060}
.a-xp-next{font-size:11px;color:#ccc;font-family:'Lato',sans-serif}
.a-xp-track{height:9px;background:#f5eae8;border-radius:5px;overflow:hidden}
.a-xp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#c9728a,#e8a0b8,#ffd7b4);transition:width 0.5s ease;animation:aglow 3s ease-in-out infinite}
@keyframes aglow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}

.a-lives-row{margin:10px 16px 0;display:flex;align-items:center;gap:8px}
.a-lives-lbl{font-family:'Lato',sans-serif;font-size:11px;color:#ccc;letter-spacing:1px;text-transform:uppercase}
.a-hearts{display:flex;gap:3px;margin-left:4px}
.a-heart{font-size:17px}
.a-heart.lost{filter:grayscale(1);opacity:0.25}
.a-streak{margin-left:auto;background:linear-gradient(135deg,#c9728a,#e8a0b8);border-radius:20px;padding:4px 12px;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;color:#fff;cursor:pointer}

.a-sec{margin:14px 16px 0}
.a-sh{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid #f0ddd8}
.a-sh-ico{font-size:14px}
.a-sh-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;font-style:italic;color:#5a2a3a}
.a-sh-count{margin-left:auto;font-family:'Lato',sans-serif;font-size:11px;color:#ccc}

.a-task{background:#fff;border:1px solid #f0ddd8;border-radius:13px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity 0.2s;box-shadow:0 1px 5px rgba(180,100,120,0.05);position:relative;overflow:hidden}
.a-task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px}
.a-task.must::before{background:linear-gradient(180deg,#c9728a,#e8a0b8)}
.a-task.reg::before{background:#f0e0e8}
.a-task:active{opacity:0.8}
.a-task.done{opacity:0.38}
.a-task.done .a-tn{text-decoration:line-through;color:#bbb}
.a-chk{width:25px;height:25px;border-radius:50%;border:2px solid #e8c8d0;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 0.2s;background:#fdf5f8}
.a-task.done .a-chk{background:#c9728a;border-color:#c9728a;color:#fff}
.a-ti{flex:1;min-width:0}
.a-tn{font-family:'Lato',sans-serif;font-size:13px;font-weight:700;color:#3a1a28}
.a-ts{font-family:'Lato',sans-serif;font-size:11px;color:#c9728a;margin-top:1px}
.a-pts{font-family:'Lato',sans-serif;font-size:11px;font-weight:700;color:#c9728a;flex-shrink:0}

.a-quest{margin:14px 16px 0;background:linear-gradient(135deg,#3d1a2e,#6b2d4a);border-radius:15px;padding:15px;position:relative;overflow:hidden}
.a-quest::after{content:'✦ ✦ ✦';position:absolute;top:11px;right:13px;font-size:9px;color:rgba(255,215,180,0.18);letter-spacing:5px}
.aq-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.aq-icon{font-size:22px}
.aq-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;font-style:italic;color:#ffd7b4}
.aq-sub{font-family:'Lato',sans-serif;font-size:10px;color:rgba(255,215,180,0.4);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.aq-track{height:7px;background:rgba(0,0,0,0.25);border-radius:4px;overflow:hidden;border:1px solid rgba(255,215,180,0.1)}
.aq-fill{height:100%;width:55%;background:linear-gradient(90deg,#c9728a,#ffd7b4);border-radius:4px}
.aq-lbl{font-family:'Lato',sans-serif;font-size:10px;color:rgba(255,215,180,0.38);margin-top:5px;text-align:right}

.a-lb{background:#fff;border:1px solid #f0ddd8;border-radius:13px;overflow:hidden;box-shadow:0 1px 5px rgba(180,100,120,0.05)}
.alb-row{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid #f8f0f4}
.alb-row:last-child{border-bottom:none}
.alb-rk{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;width:16px;color:#ddd}
.alb-rk.g{color:#f0c060}.alb-rk.s{color:#bbb}
.alb-me{background:#fdf5f8}
.alb-nm{font-family:'Lato',sans-serif;font-size:13px;font-weight:700;flex:1;color:#3a1a28;padding-left:6px}
.alb-nm.me{color:#c9728a}
.alb-pts{font-family:'Lato',sans-serif;font-size:12px;color:#c9728a;font-weight:700}

.a-shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.a-shop-item{background:#fff;border:1px solid #f0ddd8;border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;transition:transform 0.15s;box-shadow:0 1px 5px rgba(180,100,120,0.05)}
.a-shop-item:active{transform:scale(0.97)}
.a-shop-em{font-size:22px;display:block;margin-bottom:4px}
.a-shop-nm{font-family:'Lato',sans-serif;font-size:11px;font-weight:700;color:#5a2a3a}
.a-shop-co{font-family:'Lato',sans-serif;font-size:11px;color:#c9728a;font-weight:700;margin-top:2px}
.a-req-btn{width:100%;margin-top:10px;padding:12px;background:linear-gradient(135deg,#c9728a,#e8a0b8);border:none;border-radius:12px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer}

/* ══════════════════════════════
   NARAIN
   ══════════════════════════════ */
.nbg{background:#0a0c10;min-height:100%}
.nbn{background:rgba(10,12,16,0.97);backdrop-filter:blur(20px);border-top-color:rgba(232,48,48,0.2)}
.nbn .bnav-lbl{color:#333}
.nbn .bnav-item.active .bnav-lbl{color:#e83030}

.n-hero{background:linear-gradient(160deg,#0d0d14 0%,#1a0808 50%,#0a0a1a 100%);padding:18px 16px 15px;border-bottom:2px solid rgba(232,48,48,0.4);position:relative;overflow:hidden}
.n-glow-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#e83030,#ffd700,#3050e8,#e83030);background-size:200%;animation:glowbar 3s linear infinite}
@keyframes glowbar{0%{background-position:0%}100%{background-position:200%}}
.n-top{display:flex;align-items:center;gap:12px}
.n-av{width:60px;height:60px;border-radius:11px;background:linear-gradient(135deg,#1a0808,#2a1010);font-size:26px;display:flex;align-items:center;justify-content:center;border:2px solid #e83030;box-shadow:0 0 18px rgba(232,48,48,0.35);flex-shrink:0;animation:npulse 2s ease-in-out infinite}
@keyframes npulse{0%,100%{box-shadow:0 0 18px rgba(232,48,48,0.35)}50%{box-shadow:0 0 30px rgba(232,48,48,0.65)}}
.n-id{flex:1}
.n-name{font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;color:#fff;text-shadow:0 0 12px rgba(232,48,48,0.5),2px 2px 0 #e83030}
.n-rank{font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:#ffd700;margin-top:2px}
.n-lvl-box{background:linear-gradient(135deg,#e83030,#ff6020);border-radius:10px;padding:7px 11px;text-align:center;box-shadow:0 3px 11px rgba(232,48,48,0.4);flex-shrink:0}
.n-lvl-n{font-family:'Bangers',cursive;font-size:22px;color:#fff;line-height:1;letter-spacing:2px}
.n-lvl-l{font-family:'Nunito',sans-serif;font-size:9px;color:rgba(255,255,255,0.6);font-weight:800;letter-spacing:1px}

.n-power-card{margin:11px 16px 0;background:rgba(255,255,255,0.025);border:1px solid rgba(232,48,48,0.14);border-radius:12px;padding:11px 13px}
.n-pow-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.n-pow-lbl{font-family:'Bangers',cursive;font-size:13px;letter-spacing:2px;color:#ffd700}
.n-pow-num{font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:#555}
.n-pow-track{height:12px;background:rgba(0,0,0,0.4);border-radius:6px;overflow:hidden;border:1px solid rgba(232,48,48,0.14);position:relative}
.n-pow-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#e83030,#ff9020,#ffd700);animation:nflicker 1.5s ease-in-out infinite;position:relative;transition:width 0.5s ease}
@keyframes nflicker{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.n-pow-fill::after{content:'⚡';position:absolute;right:3px;top:-2px;font-size:12px}

.n-shields-row{margin:9px 16px 0;display:flex;align-items:center;gap:7px}
.n-sh-lbl{font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:#444;letter-spacing:1px;text-transform:uppercase}
.n-sh-icons{display:flex;gap:3px}
.n-sh{font-size:17px}
.n-sh.lost{filter:grayscale(1);opacity:0.18}
.n-streak-pill{margin-left:auto;background:linear-gradient(135deg,#e83030,#ff6020);border-radius:20px;padding:3px 11px;font-family:'Bangers',cursive;font-size:14px;letter-spacing:1.5px;color:#fff;cursor:pointer}

.n-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:9px 16px 0}
.n-stat{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:9px 7px;text-align:center}
.n-stat-v{font-family:'Bangers',cursive;font-size:18px;letter-spacing:1px;color:#ffd700;line-height:1}
.n-stat-l{font-family:'Nunito',sans-serif;font-size:9px;font-weight:800;color:#444;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

.n-sec{margin:13px 16px 0}
.n-sh-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.n-stag{font-family:'Bangers',cursive;font-size:12px;letter-spacing:2px;padding:3px 9px;border-radius:5px;text-transform:uppercase}
.ntm{background:rgba(232,48,48,0.14);color:#ff5050;border:1px solid rgba(232,48,48,0.25)}
.ntw{background:rgba(30,100,220,0.1);color:#5080ff;border:1px solid rgba(30,100,220,0.2)}
.ntd{background:rgba(255,160,0,0.1);color:#ffb020;border:1px solid rgba(255,160,0,0.2)}
.ntb{background:rgba(60,200,100,0.1);color:#40e080;border:1px solid rgba(60,200,100,0.2)}
.n-cnt{margin-left:auto;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:#444}

.n-task{background:rgba(255,255,255,0.022);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity 0.2s;position:relative;overflow:hidden}
.n-task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px}
.n-task.must::before{background:#e83030;box-shadow:0 0 5px #e83030}
.n-task.week::before{background:#3050e8;box-shadow:0 0 5px #3050e8}
.n-task.daily::before{background:#ffb020;box-shadow:0 0 5px #ffb020}
.n-task:active{opacity:0.7}
.n-task.done{opacity:0.25}
.n-task.done .n-tn{text-decoration:line-through}
.n-chk{width:24px;height:24px;border-radius:6px;border:2px solid rgba(255,255,255,0.13);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 0.2s}
.n-task.done .n-chk{background:#40e080;border-color:#40e080;color:#000}
.n-te{font-size:19px;flex-shrink:0}
.n-ti{flex:1;min-width:0}
.n-tn{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:#eee}
.n-ts{font-family:'Nunito',sans-serif;font-size:10px;color:#555;margin-top:1px;font-weight:700}
.n-xp{font-family:'Bangers',cursive;font-size:12px;letter-spacing:1px;color:#ffd700;flex-shrink:0}
.n-xp.bxp{color:#40e080}

.n-boss{margin:13px 16px 0;background:linear-gradient(135deg,#1a0505,#0a0514,#050a1a);border:2px solid rgba(232,48,48,0.32);border-radius:13px;padding:13px;position:relative;overflow:hidden}
.n-boss::after{content:'🔥';position:absolute;right:12px;top:10px;font-size:22px;animation:fbob 1.5s ease-in-out infinite}
@keyframes fbob{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.2) rotate(5deg)}}
.nb-title{font-family:'Bangers',cursive;font-size:16px;letter-spacing:3px;color:#e83030;text-shadow:0 0 8px rgba(232,48,48,0.4)}

function today(){ return new Date().toISOString().slice(0,10); }
function tk(who,id){ return who+'|'+id+'|'+today(); }
function isDone(who,id){ return !!S.tasks[tk(who,id)]; }
function setDone(who,id,v){ if(v) S.tasks[tk(who,id)]=1; else delete S.tasks[tk(who,id)]; save(); }

// ═══════════ TIME HELPERS ═══════════
function parseTime(t){
  // t like "7:00am" "8:30pm" "noon"
  if(!t||t==='anytime') return 9999;
  if(t==='noon') return 12*60;
  const m = t.toLowerCase().match(/(\d+):?(\d*)([ap]m)?/);
  if(!m) return 9999;
  let h=parseInt(m[1]), min=parseInt(m[2]||0), ap=m[3]||'';
  if(ap==='pm'&&h!==12) h+=12;
  if(ap==='am'&&h===12) h=0;
  return h*60+min;
}
function formatTime(t){
  if(!t||t==='anytime') return '';
  if(t==='noon') return '12:00 PM';
  const m = t.toLowerCase().match(/(\d+):?(\d*)([ap]m)?/);
  if(!m) return t;
  let h=parseInt(m[1]), min=parseInt(m[2]||0), ap=m[3]||'';
  if(ap==='pm'&&h!==12) h+=12;
  if(ap==='am'&&h===12) h=0;
  const h12 = h%12||12, ampm = h>=12?'PM':'AM';
  return h12+':'+(min<10?'0':'')+min+' '+ampm;
}
function timeBadge(t){
  if(!t||t==='anytime') return '';
  const now = new Date(), cur = now.getHours()*60+now.getMinutes();
  const mt = parseTime(t);
  const diff = mt - cur;
  let cls, label = formatTime(t);
  if(diff < -30) cls='time-past';
  else if(diff <= 15) cls='time-now';
  else cls='time-future';
  return `<span class="time-badge ${cls}">${label}</span>`;
}

function toggleP(who,id,pts){
  const d=isDone(who,id);
  setDone(who,id,!d);
  S.users[who].xp=Math.max(0,S.users[who].xp+(d?-pts:pts));
  save(); renderParent(who);
}

function pTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>{p.classList.remove('active');p.style.display='none';});
  const el=document.getElementById('tab-'+name);
  if(el){el.classList.add('active');el.style.display='block';}
  document.querySelectorAll('#app-bnav .bnav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('app-body').scrollTop=0;
}

    50:{em:'🏆',title:'50 DAYS!',sub:'LEGENDARY STATUS.\nThe whole squad is watching!'},
    100:{em:'💥',title:'100 DAYS!',sub:'FINAL BOSS DEFEATED.\nYOU are the Avenger now!'},
  }
};

function cel(who){
  const streak=S.users[who].streak;
  const milestones=[100,50,25,15,7];
  let data=null;
  for(const m of milestones){ if(streak>=m){ data=CEL[who]?.[m]; break; } }
  if(!data) data={em:'🔥',title:`${streak} DAY STREAK!`,sub:'Keep going!\nA milestone is coming!'};
  document.getElementById('cel-em').textContent=data.em;
  document.getElementById('cel-title').textContent=data.title;
  document.getElementById('cel-sub').textContent=data.sub;
  spawnConfetti();
  showScreen('s-cel');
}

function spawnConfetti(){
  const cel=document.getElementById('s-cel');
  cel.querySelectorAll('.cp').forEach(c=>c.remove());
  const cols=['#ff6eb4','#ffd700','#c9728a','#e83030','#40e080','#60c8f0','#fff','#f0c060'];
  for(let i=0;i<55;i++){
    const c=document.createElement('div');
    c.className='cp';
    c.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    cel.appendChild(c);
  }
}
